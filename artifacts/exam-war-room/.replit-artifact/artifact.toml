kind = "web"
previewPath = "/"
title = "Exam War Room"
version = "1.0.0"
id = "artifacts/exam-war-room"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25167

[services.development]
run = "pnpm --filter @workspace/exam-war-room run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exam-war-room", "run", "build" ]
publicDir = "artifacts/exam-war-room/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25167"
BASE_PATH = "/"
